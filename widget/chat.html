<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantlix Protected Chat — Inline demo</title>
  </head>
  <body style="background:#08111F;color:#F3F7FF;font-family:Inter,system-ui,sans-serif;">
    <main style="max-width:760px;margin:32px auto;padding:0 16px;">
      <h1 style="font-size:22px;margin:0 0 8px;">Try it live</h1>
      <p style="color:#9eb0c9;font-size:14px;line-height:1.5;margin:0 0 20px;">
        Working chat connected to your deployment. Try a risky prompt and watch Quantlix govern it.
      </p>
      <div id="quantlix-chat-root"></div>
    </main>

    <!-- Demo mode by default (no keys). Set real deploymentId + apiKey to hit /run. -->
    <script>
      window.QuantlixChatConfig = {
        mode: "inline",
        lazyLoad: false,
        showBranding: true,
      };
    </script>
    <script type="module" src="/src/chat/main.tsx"></script>
  </body>
</html>
