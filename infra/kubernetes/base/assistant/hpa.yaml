apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantlix-assistant
  namespace: quantlix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantlix-assistant
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
